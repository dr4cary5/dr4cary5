<svg xmlns="http://www.w3.org/2000/svg" width="800" height="250" viewBox="0 0 800 250">
  <rect width="100%" height="100%" fill="#0D1117"/>
  
  <!-- اسلاید ۱: nmap -->
  <g>
    <animate attributeName="opacity" values="1;1;0;0;0;0" keyTimes="0;0.28;0.33;0.66;0.99;1" dur="4.5s" repeatCount="indefinite" />
    <text x="20" y="40" font-family="Courier New,monospace" font-size="16" fill="#FF5555">┌──(root㉿kali)-[~]</text>
    <text x="20" y="65" font-family="Courier New,monospace" font-size="16" fill="#FF5555">└─#</text><text x="70" y="65" font-family="Courier New,monospace" font-size="16" fill="#8BE9FD">nmap -sT matrix.io</text>
    <text x="20" y="90" font-family="Courier New,monospace" font-size="16" fill="#00FF41">PORT    STATE    SERVICE</text>
    <text x="20" y="110" font-family="Courier New,monospace" font-size="16" fill="#00FF41">80/tcp  open     http</text>
    <text x="20" y="130" font-family="Courier New,monospace" font-size="16" fill="#00FF41">443/tcp open     https</text>
    <text x="20" y="160" font-family="Courier New,monospace" font-size="16" fill="#FF5555">┌──(root㉿kali)-[~]</text>
    <text x="20" y="185" font-family="Courier New,monospace" font-size="16" fill="#FF5555">└─#</text><text x="70" y="185" font-family="Courier New,monospace" font-size="16" fill="#00FF41">⠏</text>
  </g>

  <!-- اسلاید ۲: پیام ماتریکس -->
  <g>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.28;0.33;0.66;0.99;1" dur="4.5s" repeatCount="indefinite" />
    <text x="20" y="40" font-family="Courier New,monospace" font-size="16" fill="#FF5555">┌──(root㉿kali)-[~]</text>
    <text x="20" y="65" font-family="Courier New,monospace" font-size="16" fill="#FF5555">└─#</text><text x="70" y="65" font-family="Courier New,monospace" font-size="16" fill="#8BE9FD">cat /etc/matrix/message.txt</text>
    <text x="20" y="90" font-family="Courier New,monospace" font-size="16" fill="#00FF41">Wake up, Neo...</text>
    <text x="20" y="115" font-family="Courier New,monospace" font-size="16" fill="#00FF41">The Matrix has you...</text>
    <text x="20" y="140" font-family="Courier New,monospace" font-size="16" fill="#00FF41">Follow the white rabbit.</text>
    <text x="20" y="165" font-family="Courier New,monospace" font-size="16" fill="#FF5555">┌──(root㉿kali)-[~]</text>
    <text x="20" y="190" font-family="Courier New,monospace" font-size="16" fill="#FF5555">└─#</text><text x="70" y="190" font-family="Courier New,monospace" font-size="16" fill="#00FF41">⠋</text>
  </g>

  <!-- اسلاید ۳: دسترسی -->
  <g>
    <animate attributeName="opacity" values="0;0;0;0;1;1" keyTimes="0;0.66;0.71;0.74;0.77;1" dur="4.5s" repeatCount="indefinite" />
    <text x="20" y="40" font-family="Courier New,monospace" font-size="16" fill="#FF5555">┌──(root㉿kali)-[~]</text>
    <text x="20" y="65" font-family="Courier New,monospace" font-size="16" fill="#FF5555">└─#</text><text x="70" y="65" font-family="Courier New,monospace" font-size="16" fill="#8BE9FD">ssh neo@matrix.io</text>
    <text x="20" y="90" font-family="Courier New,monospace" font-size="16" fill="#F1FA8C">neo@matrix.io's password:</text>
    <text x="20" y="115" font-family="Courier New,monospace" font-size="16" fill="#00FF41">Access Granted.</text>
    <text x="20" y="140" font-family="Courier New,monospace" font-size="16" fill="#00FF41">Welcome, Neo.</text>
    <text x="20" y="165" font-family="Courier New,monospace" font-size="16" fill="#FF5555">┌──(root㉿kali)-[~]</text>
    <text x="20" y="190" font-family="Courier New,monospace" font-size="16" fill="#FF5555">└─#</text><text x="70" y="190" font-family="Courier New,monospace" font-size="16" fill="#00FF41">⠙</text>
  </g>
</svg>
