    <tspan x="680" dy="0">0</tspan><tspan x="680" dy="20">x</tspan><tspan x="680" dy="20">4</tspan><tspan x="680" dy="20">1</tspan><tspan x="680" dy="20">F</tspan><tspan x="680" dy="20">F</tspan><tspan x="680" dy="20">0</tspan><tspan x="680" dy="20">0</tspan><tspan x="680" dy="20">G</tspan><tspan x="680" dy="20">r</tspan><tspan x="680" dy="20">3</tspan><tspan x="680" dy="20">3</tspan><tspan x="680" dy="20">n</tspan>
