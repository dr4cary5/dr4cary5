      <stop offset="80%" stop-color="#00FF41" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00FF41" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <!-- ستون‌های بارش کد -->
  <text font-family="monospace" font-size="14" fill="url(#fade)">
