  </text>
  
  <text font-family="monospace" font-size="12" fill="url(#fade)" opacity="0.7">
    <animate attributeName="y" from="-200" to="220" dur="3.5s" repeatCount="indefinite"/>
    <tspan x="150" dy="0">7</tspan><tspan x="150" dy="18">A</tspan><tspan x="150" dy="18">3</tspan><tspan x="150" dy="18">F</tspan><tspan x="150" dy="18">9</tspan><tspan x="150" dy="18">C</tspan><tspan x="150" dy="18">2</tspan><tspan x="150" dy="18">E</tspan><tspan x="150" dy="18">B</tspan><tspan x="150" dy="18">8</tspan><tspan x="150" dy="18">D</tspan><tspan x="150" dy="18">4</tspan>
