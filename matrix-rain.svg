    <tspan x="400" dy="0">S</tspan><tspan x="400" dy="20">y</tspan><tspan x="400" dy="20">s</tspan><tspan x="400" dy="20">t</tspan><tspan x="400" dy="20">e</tspan><tspan x="400" dy="20">m</tspan><tspan x="400" dy="20">:</tspan><tspan x="400" dy="20">O</tspan><tspan x="400" dy="20">n</tspan><tspan x="400" dy="20">l</tspan><tspan x="400" dy="20">i</tspan><tspan x="400" dy="20">n</tspan><tspan x="400" dy="20">e</tspan>
  </text>
  
  <text font-family="monospace" font-size="11" fill="url(#fade)" opacity="0.6">
    <animate attributeName="y" from="-200" to="220" dur="4.2s" repeatCount="indefinite"/>
    <tspan x="550" dy="0">R</tspan><tspan x="550" dy="16">o</tspan><tspan x="550" dy="16">o</tspan><tspan x="550" dy="16">t</tspan><tspan x="550" dy="16">@</tspan><tspan x="550" dy="16">k</tspan><tspan x="550" dy="16">a</tspan><tspan x="550" dy="16">l</tspan><tspan x="550" dy="16">i</tspan><tspan x="550" dy="16">:</tspan><tspan x="550" dy="16">#</tspan><tspan x="550" dy="16">_</tspan>
